{% extends 'base.html' %}
{% block title %}404 | Page Not Found{% endblock %}
{% block content %}
<section class="section-gap pt-24">
    <div class="container mx-auto px-4 text-center max-w-3xl">
        <p class="glitch" data-text="404">404</p>
        <h1 class="section-title mt-4">This page phased out of the grid.</h1>
        <p class="text-muted mt-4">The URL might be outdated or mistyped. Redirecting to home in a few seconds.</p>
        <a href="{{ url_for('main.home') }}" class="capsule-btn capsule-primary mt-8">Go Home</a>
    </div>
</section>
<script>
setTimeout(() => {
    window.location.href = "{{ url_for('main.home') }}";
}, 8000);
</script>
{% endblock %}
