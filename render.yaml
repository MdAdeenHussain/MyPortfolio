services:
  - type: web
    name: adeen-portfolio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: adeen-portfolio-db
          property: connectionString

databases:
  - name: adeen-portfolio-db
    databaseName: adeen_portfolio
    user: adeen_user
